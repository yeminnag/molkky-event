<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="panels.css">
    <link rel="stylesheet" href="scoresheet.css">
    <link rel="stylesheet" href="overlay.css">
    <link rel="stylesheet" href="celebration.css">
    <link rel="stylesheet" href="standby.css">
    <style>
        /* Chroma-key backdrop for the combined overlay. overlay.css forces the
           background transparent for OBS, so override it here (with matching
           !important) to paint a solid green-screen fill instead. */
        html,
        body.overlay-body {
            background: #00b140 !important;
            background-color: #00b140 !important;
        }
    </style>
    <title>Mölkky Overlay</title>
</head>
<body class="overlay-body">
    <!-- Scorebug (was overlay-bar.html) -->
    <section class="overlay-broadcast" id="broadcast-area">
        <div class="team-panels" id="team-panels"></div>
    </section>

    <!-- Score sheet (was overlay-sheet.html) -->
    <section class="overlay-scoresheet" id="overlay-scoresheet">
        <div class="scoresheet" id="scoresheet"></div>
    </section>

    <!-- Pre-match standby scene (shown while no match is active) -->
    <div class="standby" id="standby">
        <div class="standby__card">
            <p class="standby__eyebrow">MÖLKKY</p>
            <div class="standby__pins" aria-hidden="true">
                <span class="skittle skittle--molkky" style="--i: 0"></span>
                <span class="skittle" style="--i: 1">7</span>
                <span class="skittle" style="--i: 2">9</span>
                <span class="skittle" style="--i: 3">12</span>
                <span class="skittle" style="--i: 4">3</span>
                <span class="skittle" style="--i: 5">10</span>
                <span class="skittle" style="--i: 6">6</span>
            </div>
            <h1 class="standby__title">まもなく試合開始</h1>
            <p class="standby__sub">少々お待ちください</p>
            <div class="standby__loader" role="status" aria-label="試合開始をお待ちください">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Win celebration (was overlay-win.html) -->
    <div class="win-fx" id="win-fx" role="status" aria-live="polite">
        <div class="win-fx__flash"></div>
        <div class="win-fx__rays"></div>
        <div class="win-fx__ring"></div>
        <div class="win-fx__ring win-fx__ring--two"></div>
        <div class="win-fx__ring win-fx__ring--three"></div>
        <div class="win-fx__confetti" id="win-fx-confetti"></div>
        <div class="win-fx__card">
            <div class="win-fx__label">WINNER</div>
            <div class="win-fx__team" id="win-fx-team"></div>
            <div class="win-fx__score" id="win-fx-score"></div>
        </div>
    </div>

    <!-- Shared match state -->
    <script src="match-db.js"></script>
    <script src="match.js"></script>
    <script src="team-panels.js"></script>
    <script src="scoresheet.js"></script>

    <!-- Entry points, one per merged source -->
    <script src="bar.js"></script>
    <script src="sheet.js"></script>
    <script src="reveal.js"></script>
    <script src="celebration.js"></script>
    <script src="standby.js"></script>
</body>
</html>

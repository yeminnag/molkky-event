<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mölkky Admin Page</title>
</head>
<body>
    <header>
        <h1>アドミンページ</h1>
    </header>

    <main>
        <!-- ============ 1. TEAM CREATION ============ -->
        <section class="card" id="team-section">
            <h2>チーム作成 </h2>

            <div class="row">
                <input type="text" id="team-name-input" placeholder="チーム名を入力" maxlength="30">
                <button id="add-team-btn">＋ チームを追加</button>
            </div>

            <p class="hint">チームカードをクリックして試合に参加させるチームを2つ以上選択してください。</p>

            <div class="teams-grid" id="teams-grid"></div>
        </section>
    </main>

    <button type="button" id="match-start-btn" class="match-start-fab" hidden>
        ▶ 試合開始（<span id="match-start-count">0</span>チーム選択中）
    </button>

    <script src="app.js"></script>
</body>
</html>
